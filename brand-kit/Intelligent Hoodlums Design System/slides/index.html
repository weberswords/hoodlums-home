<!DOCTYPE html>

<head>

<title>Intelligent Hoodlums — Slide Kit</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="deck-stage.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; }
  deck-stage section {
    width: 1920px; height: 1080px;
    overflow: hidden;
    flex-shrink: 0;
  }
</style>

<script type="application/json" id="speaker-notes">

  "Ridgewood MS. Six teachers. Three weeks. Shipped. Used. Renewed. That's the whole story — and the whole standard. Not binders. Not laminated frameworks. Work that actually gets used.",
  "Three pillars. Design: curriculum and PL pressure-tested in real classrooms. Disrupt: audits and the uncomfortable questions vendors avoid. Deliver: workshops, coaching, produced artifacts that get used — not shelved.",
  "House Rules aren't values on a wall. They're the filter every project runs through. We design with teachers, never at them. We refuse to sell temporal solutions. We speak plain. We dress sharp. We move quiet.",

  "Twelve-plus years in classrooms. Six teachers per cohort — small by design, deep by default. Three-week average engagement. Zero maintenance contracts. The handoff runs without us. Every time.",

</script>
</head>
<body>

<script type="text/babel" src="SlideBase.jsx"></script>
<script type="text/babel" src="CoverSlide.jsx"></script>
<script type="text/babel" src="SectionOpenerSlide.jsx"></script>
<script type="text/babel" src="BigQuoteSlide.jsx"></script>
<script type="text/babel" src="CaseStudySlide.jsx"></script>
<script type="text/babel" src="PillarsSlide.jsx"></script>
<script type="text/babel" src="BodySlide.jsx"></script>
<script type="text/babel" src="ComparisonSlide.jsx"></script>
<script type="text/babel" src="StatsSlide.jsx"></script>
<script type="text/babel" src="AgendaSlide.jsx"></script>
<script type="text/babel" src="TwoColumnSlide.jsx"></script>
<script type="text/babel" src="CreditsSlide.jsx"></script>

<script type="text/babel">
const slides = [
  {
    label: '01 Cover',
    component: <CoverSlide />,
  },
  {
    label: '02 Section Opener',
    component: (
      <SectionOpenerSlide
        chapter="02"
        title="Who's Behind the Mask"
        tag="The Personnel"
        lede="Mike Lang & Webs — two instructional designers who'd seen too many schools sold temporal solutions by people who'd never set foot in a classroom on a Tuesday."
      />
    ),
  },
  {
    label: '03 Big Quote',
    component: (
      <BigQuoteSlide
        quote="If it can't survive a Tuesday, it's not a strategy."
        attribution="The Voice · Crew Talk"
        context="Every framework, every deck, every workshop — it runs through this filter before it leaves the studio."
        dark={true}
      />
    ),
  },
  {
    label: '04 Case Study',
    component: (
      <CaseStudySlide
        label="Case Study · 2024"
        school="Ridgewood MS"
        district="Clark County School District"
        teachers={6}
        weeks={3}
        outcome="Shipped. Used. Renewed."
        body="Everything we make is pressure-tested by people who've taught it, in classrooms that didn't cooperate, at schools where Tuesday is the hardest day."
      />
    ),
  },
  {
    label: '05 Pillars',
    component: <PillarsSlide />,
  },
  {
    label: '06 Body',
    component: (
      <BodySlide
        chapter="05"
        tag="House Rules"
        title={"The Filter Every\nProject Runs Through"}
        items={[
          'We design with teachers, never at them.',
          'We disrupt anything that wastes their time.',
          'We deliver work that survives Monday morning.',
          'We refuse to sell temporal solutions.',
          'We speak plain. We dress sharp. We move quiet.',
          'We are the hoodlums in the room.',
        ]}
      />
    ),
  },
  {
    label: '07 Comparison',
    component: (
      <ComparisonSlide
        leftLabel="The CFL Playbook"
        rightLabel="The Hoodlums Way"
        leftItems={[
          '$40k PD day. One laminated handout.',
          'Three-day retreat. Nothing by Monday.',
          '"World-class" frameworks. Untested.',
          '"Best-in-breed" solutions. Off the shelf.',
          'Vendor dependency built in.',
          "Consultants who've never taught Tuesday.",
        ]}
        rightItems={[
          'Six teachers. Three weeks. Shipped.',
          'Work that survives Monday morning.',
          'Pressure-tested in real classrooms.',
          "Built for the context it'll live in.",
          'Every handoff runs without us.',
          'Practitioners. Always in the room.',
        ]}
      />
    ),
  },
  {
    label: '08 Stats',
    component: (
      <StatsSlide
        chapter="03"
        tag="The Backstory"
        headline={"The Numbers That\nDon't Lie."}
        stats={[
          { val: '12+', label: 'Years in Classrooms',    caption: 'Founded 2014 · Still in the room' },
          { val: '6',   label: 'Teachers Per Cohort',    caption: 'Small by design. Deep by default.' },
          { val: '3wk', label: 'Average Engagement',     caption: 'Pressure-tested. Not padded.' },
          { val: '0',   label: 'Maintenance Contracts',  caption: 'The handoff runs without us.' },
        ]}
      />
    ),
  },
  {
    label: '09 Agenda',
    component: (
      <AgendaSlide
        workshopTitle="Workshop Agenda"
        date="Tuesday Morning · 8:00–11:30"
        items={[
          { time: '8:00',  duration: '30 min', title: 'The Diagnosis',        note: "Where are we? What isn't working? Name it." },
          { time: '8:30',  duration: '60 min', title: 'The Framework',        note: "Structure that survives contact. Build, don't buy." },
          { time: '9:30',  duration: '15 min', title: 'Break',                note: 'Get coffee. Come back ready.' },
          { time: '9:45',  duration: '45 min', title: 'The Work Session',     note: 'Practitioner-led. Peer-pressure-tested.' },
          { time: '10:30', duration: '45 min', title: 'The Handoff Protocol', note: 'What runs without us? Every artifact. Every time.' },
          { time: '11:15', duration: '15 min', title: 'The Hook',             note: "What's next? Every page turns." },
        ]}
      />
    ),
  },
  {
    label: '10 Two Column',
    component: (
      <TwoColumnSlide
        chapter="07"
        tag="The Three Pillars"
        title={"What We\nActually Build."}
        leftBody="Not binders. Not laminated frameworks. Not a three-day retreat that leaves teachers with one handout and a pen."
        sections={[
          { label: 'Curriculum Design',    items: ['Unit maps', 'Lesson frameworks', 'Assessment architecture', 'Scope & sequence'] },
          { label: 'Professional Learning', items: ['Workshop facilitation', 'Coaching protocols', 'PLC structure', 'Observation tools'] },
          { label: 'Produced Artifacts',   items: ['Slide decks', 'Playbooks', 'Micro-courses', 'Video modules'] },
        ]}
      />
    ),
  },
  {
    label: '11 Credits',
    component: <CreditsSlide />,
  },
];

// Mount each slide as a <section> inside <deck-stage>
const stage = document.querySelector('deck-stage');

slides.forEach(({ label, component }) => {
  const section = document.createElement('section');
  section.setAttribute('data-screen-label', label);
  section.setAttribute('data-om-validate', 'true');
  stage.appendChild(section);
  const root = ReactDOM.createRoot(section);
  root.render(component);
});
</script>

<deck-stage></deck-stage>

</body>
</html>
