<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--hm-prussian); padding: 24px; }
.credits-box {
  font-family: var(--font-mono); font-weight: 100;
  font-size: 10px; line-height: 2.2; text-align: left;
}
.row { display: flex; gap: 16px; }
.cr-label { color: var(--hm-tuscany); text-transform: uppercase; letter-spacing: 0.1em; min-width: 100px; }
.cr-value { color: var(--hm-bone); }
.divider { height: 1px; background: rgba(242,232,213,0.15); margin: 10px 0; }
.note { font-family: var(--font-mono); font-weight: 100; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--hm-tuscany); margin-bottom: 12px; }
</style>
</head><body>
<div class="note">05 · Credits Box · Mono only · Prussian bg</div>
<div class="credits-box">
  <div class="row"><span class="cr-label">Firm</span><span class="cr-value">The Intelligent Hoodlums</span></div>
  <div class="row"><span class="cr-label">Founded</span><span class="cr-value">2014 · Las Vegas, Nevada</span></div>
  <div class="row"><span class="cr-label">Owners</span><span class="cr-value">Mike Lang &amp; Webs</span></div>
  <div class="divider"></div>
  <div class="row"><span class="cr-label">Vol / Issue</span><span class="cr-value">Vol.01 · Issue 001</span></div>
  <div class="row"><span class="cr-label">Status</span><span class="cr-value">Working document</span></div>
  <div class="row"><span class="cr-label">Last touched</span><span class="cr-value">22 April 2026</span></div>
</div>
</body></html>
