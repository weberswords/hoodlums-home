<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--hm-bone); }
.masthead {
  background: var(--hm-prussian);
  color: var(--hm-bone);
  padding: 10px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-weight: 100;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.masthead-center {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--hm-bone);
}
.note { font-family: var(--font-mono); font-weight: 100; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--hm-tuscany); padding: 10px 24px 4px; }
.masthead-dark {
  background: var(--hm-ink);
  color: var(--hm-bone);
  padding: 10px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-weight: 100;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
</style>
</head><body>
<div class="note">01 · Masthead · Prussian variant</div>
<div class="masthead">
  <span>The Intelligent Hoodlums · Vol.01</span>
  <span class="masthead-center">Design · Disrupt · Deliver</span>
  <span>LV · EST 2014 · NV</span>
</div>
<div class="note" style="margin-top:10px;">01 · Masthead · Ink variant</div>
<div class="masthead-dark">
  <span>Brand Kit Worksheet · Issue 001</span>
  <span style="font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:0.07em;text-transform:uppercase;">Intelligent Hoodlums</span>
  <span>Las Vegas · Nevada</span>
</div>
</body></html>
