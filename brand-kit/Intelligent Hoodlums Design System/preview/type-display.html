<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--hm-bone); padding: 24px; }
.rule { height: 1px; background: var(--hm-ink); margin: 12px 0; opacity: 0.15; }
.tag { font-family: var(--font-mono); font-weight: 100; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--hm-tuscany); margin-bottom: 4px; }
.display-xl { font-family: var(--font-display); font-weight: 700; font-size: 64px; line-height: 1.0; letter-spacing: 0.015em; color: var(--hm-ink); }
.display-lg { font-family: var(--font-display); font-weight: 700; font-size: 40px; line-height: 1.05; letter-spacing: 0.015em; color: var(--hm-ink); }
.splash-text { font-family: var(--font-splash); font-weight: 700; font-size: 28px; line-height: 1.0; letter-spacing: 0.07em; text-transform: uppercase; color: var(--hm-bone); background: var(--hm-prussian); padding: 10px 16px; display: inline-block; }
.rufous-rule { height: 3px; background: var(--hm-rufous); width: 48px; margin-top: 10px; }
</style>
</head><body>
<div class="tag">Display · Avocado Sans Bold · Headlines &amp; Title Plates</div>
<div class="display-xl">Design.<br>Disrupt.<br>Deliver.</div>
<div class="rufous-rule"></div>
<div class="rule"></div>
<div class="tag">Display · Pull Quote</div>
<div class="display-lg">"When in doubt,<br>trust a Hoodlum."</div>
<div class="rule"></div>
<div class="tag">Splash · Masthead · ALL CAPS · Prussian Band</div>
<div class="splash-text">The Intelligent Hoodlums</div>
</body></html>
